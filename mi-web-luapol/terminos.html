<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Términos y Condiciones - LUAPOL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      background-color: #f8f9fa; 
      color: #333; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      line-height: 1.6; 
      display: flex;
      align-items: center;
      min-height: 100vh;
      padding: 20px 0;
    }
    .legal-container { 
      background-color: #ffffff; 
      padding: 40px; 
      border-radius: 12px; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
      max-width: 600px; 
      margin: auto; 
      text-align: center;
    }
    h1 { 
      color: #002244; 
      font-weight: 700; 
      font-size: 1.8rem;
      margin-bottom: 10px; 
    }
    .subtitle {
      color: #6c757d;
      margin-bottom: 35px;
      font-size: 1rem;
    }
    
    /* Estilo de los botones/enlaces */
    .legal-link {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      color: #0d6efd;
      border: 2px solid #0d6efd;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    .legal-link:hover {
      background-color: #0d6efd;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
    }

    .legal-link i {
      margin-right: 10px;
    }

    /* Adaptación específica para móviles */
    @media (max-width: 768px) {
      .legal-container { 
        padding: 30px 20px; 
        margin: 0 15px;
        border-radius: 15px;
      }
      h1 { font-size: 1.5rem; }
      .legal-link {
        padding: 18px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="legal-container">
    <h1>AVISO LEGAL, TÉRMINOS DE USO, POLÍTICA DE PRIVACIDAD Y COOKIES</h1>
    <p class="subtitle">Selecciona el tipo de términos y condiciones que deseas consultar:</p>

    <div class="d-grid gap-2">
      <a href="https://app.luapol.com/legal/terms/student/" class="legal-link">
        ALUMNOS LUAPOL/ ALUMNOS LUAPOL PREPARADORES
      </a>

      <a href="https://app.luapol.com/legal/terms/coach/" class="legal-link">
       LUAPOL PREPARADORES 
      </a>
    </div>

    <div class="mt-4 pt-3 border-top">
      <a href="/" class="text-decoration-none text-muted small">
        &larr; Volver al Inicio
      </a>
    </div>
  </div>
</div>

</body>
</html>
